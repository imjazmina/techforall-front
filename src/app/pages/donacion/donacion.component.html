<div class="container-contact100" id="donacion">
    <div class="wrap-contact100">
        <form class="contact100-form validate-form">
            <h2 class="contact100-form-title p-b-30 text-center">Solicitud de Donación</h2>

            <!-- Nombre -->
            <div class="wrap-input100 validate-input" data-validate="Por favor, ingresa tu nombre">
                <label for="name" class="form-label">Nombre</label>
                <input class="input100" type="text" name="name" id="name" placeholder="Nombre" required>
                <span class="focus-input100"></span>
            </div>

            <!-- Correo -->
            <div class="wrap-input100 validate-input" data-validate="Por favor, ingresa un correo válido">
                <label for="email" class="form-label">Correo electrónico</label>
                <input class="input100" type="email" name="email" id="email" placeholder="ejemplo@correo.com" required>
                <span class="focus-input100"></span>
            </div>

            <!-- Equipo -->
            <div class="wrap-input100 validate-input" data-validate="Por favor, describe el equipo a donar">
                <label for="equipo" class="form-label">Equipo informático</label>
                <input class="input100" type="text" name="equipo" id="equipo" placeholder="Ej. Notebook Lenovo i5" required>
                <span class="focus-input100"></span>
            </div>

            <!-- Comentario -->
            <div class="wrap-input100 validate-input" data-validate="Por favor, deja un comentario">
                <label for="comentario" class="form-label">Comentario</label>
                <textarea class="input100" name="comentario" id="comentario" placeholder="Detalles sobre el equipo, estado, etc." rows="4" required></textarea>
                <span class="focus-input100"></span>
            </div>

            <!-- Botón -->
            <div class="container-contact100-form-btn">
                <button type="submit" class="contact100-form-btn">
                    Enviar Solicitud
                </button>
            </div>
        </form>
    </div>
</div>
